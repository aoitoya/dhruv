info:
  name: get current user details
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/api/me"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Retrieves the currently authenticated user's profile.

  ## Response
  Returns the user object with email, name, and settings.
