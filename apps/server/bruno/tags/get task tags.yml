info:
  name: get task tags
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/api/tasks/{{taskId}}/tags"
  auth: inherit

runtime:
  variables:
    - name: taskId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Retrieves all tags assigned to a task.

  ## Required Variables
  - taskId (uuid): ID of the task

  ## Response
  Returns an array of tag objects.