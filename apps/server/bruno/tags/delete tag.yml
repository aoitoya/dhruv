info:
  name: delete tag
  type: http
  seq: 4

http:
  method: DELETE
  url: "{{baseUrl}}/api/tags/{{tagId}}"
  auth: inherit

runtime:
  variables:
    - name: tagId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Deletes a tag from the workspace.

  ## Required Variables
  - tagId (uuid): ID of the tag

  ## Response
  Returns 204 No Content on success.

  ## Note
  This removes the tag from all tasks, not just the workspace.