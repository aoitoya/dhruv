info:
  name: add tags to task
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/api/tasks/{{taskId}}/tags"
  body:
    type: json
    data: |-
      {
        "tagIds": ["{{tagId}}"]
      }
  auth: inherit

runtime:
  variables:
    - name: taskId
      value: ""
    - name: tagId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Adds tags to a task.

  ## Required Variables
  - taskId (uuid): ID of the task
  - tagId (uuid): ID of the tag to add

  ## Request Body
  - tagIds (array): Array of tag IDs to add

  ## Response
  Returns the updated tag list.