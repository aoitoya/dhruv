info:
  name: remove tag from task
  type: http
  seq: 7

http:
  method: DELETE
  url: "{{baseUrl}}/api/tasks/{{taskId}}/tags/{{tagId}}"
  auth: inherit

runtime:
  variables:
    - name: taskId
      value: ""
    - name: tagId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Removes a tag from a task.

  ## Required Variables
  - taskId (uuid): ID of the task
  - tagId (uuid): ID of the tag to remove

  ## Response
  Returns 204 No Content on success.