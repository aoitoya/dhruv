info:
  name: update tag
  type: http
  seq: 3

http:
  method: PATCH
  url: "{{baseUrl}}/api/tags/{{tagId}}"
  body:
    type: json
    data: |-
      {
        "name": "Updated Tag",
        "color": "#22c55e"
      }
  auth: inherit

runtime:
  variables:
    - name: tagId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Updates a tag's name or color.

  ## Required Variables
  - tagId (uuid): ID of the tag

  ## Request Body
  - name (string, optional): Tag name
  - color (string, optional): Hex color code

  ## Response
  Returns the updated tag object.