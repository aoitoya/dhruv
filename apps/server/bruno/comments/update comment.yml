info:
  name: update comment
  type: http
  seq: 3

http:
  method: PATCH
  url: "{{baseUrl}}/api/comments/{{commentId}}"
  body:
    type: json
    data: |-
      {
        "content": "Updated comment"
      }
  auth: inherit

runtime:
  variables:
    - name: commentId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Updates a comment's content.

  ## Required Variables
  - commentId (uuid): ID of the comment

  ## Request Body
  - content (string, required): New comment content

  ## Response
  Returns the updated comment object.