info:
  name: delete comment
  type: http
  seq: 4

http:
  method: DELETE
  url: "{{baseUrl}}/api/comments/{{commentId}}"
  auth: inherit

runtime:
  variables:
    - name: commentId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Deletes a comment.

  ## Required Variables
  - commentId (uuid): ID of the comment

  ## Response
  Returns 204 No Content on success.