info:
  name: create comment
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/tasks/{{taskId}}/comments"
  body:
    type: json
    data: |-
      {
        "content": "Comment text"
      }
  auth: inherit

runtime:
  variables:
    - name: taskId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Creates a comment on a task.

  ## Required Variables
  - taskId (uuid): ID of the task

  ## Request Body
  - content (string, required): Comment content

  ## Response
  Returns the created comment object.