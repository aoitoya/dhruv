info:
  name: get workspace members
  type: http
  seq: 12

http:
  method: GET
  url: "{{baseUrl}}/api/workspaces/{{workspaceId}}/members"
  auth: inherit

runtime:
  variables:
    - name: workspaceId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Retrieves all members of a workspace.

  ## Required Variables
  - workspaceId (uuid): ID of the workspace

  ## Response
  Returns an array of member objects with user details and role.