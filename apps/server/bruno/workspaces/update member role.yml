info:
  name: update member role
  type: http
  seq: 13

http:
  method: PATCH
  url: "{{baseUrl}}/api/workspaces/{{workspaceId}}/members/{{memberUserId}}"
  body:
    type: json
    data: |-
      {
        "role": "ADMIN"
      }
  auth: inherit

runtime:
  variables:
    - name: workspaceId
      value: ""
    - name: memberUserId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Updates a workspace member's role.

  ## Required Variables
  - workspaceId (uuid): ID of the workspace
  - memberUserId (uuid): ID of the user to update

  ## Request Body
  - role (string): MEMBER, ADMIN, or OWNER

  ## Response
  Returns the updated member object.