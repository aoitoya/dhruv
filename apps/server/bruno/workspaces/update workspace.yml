info:
  name: update workspace
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{baseUrl}}/api/workspaces/{{workspaceId}}"
  body:
    type: json
    data: |-
      {
        "name": "Updated Workspace Name"
      }
  auth: inherit

runtime:
  variables:
    - name: workspaceId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Updates workspace details (name, description, etc).

  ## Required Variables
  - workspaceId (uuid): ID of the workspace to update

  ## Request Body
  - name (string, optional): New workspace name
  - description (string, optional): Workspace description

  ## Response
  Returns the updated workspace object.