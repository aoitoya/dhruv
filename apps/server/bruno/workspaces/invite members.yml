info:
  name: invite members to workspace
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/api/workspaces/{{workspaceId}}/invite"
  body:
    type: json
    data: |-
      {
        "email": "{{inviteeEmail}}",
        "role": "MEMBER"
      }
  auth: inherit

runtime:
  variables:
    - name: workspaceId
      value: ""
    - name: inviteeEmail
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Sends an email invitation to join the workspace.

  ## Required Variables
  - workspaceId (uuid): ID of the workspace
  - inviteeEmail (string): Email of the person to invite

  ## Request Body
  - email (string, required): Invitee email address
  - role (string, required): MEMBER, ADMIN, or OWNER

  ## Response
  Returns the created invite object with token.

  ## Note
  Use the token from response to construct a shareable invite link.
