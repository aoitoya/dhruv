info:
  name: get all workspaces
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/api/workspaces"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Retrieves all workspaces where the authenticated user is a member.

  ## Response
  Returns an array of workspace objects with member details.