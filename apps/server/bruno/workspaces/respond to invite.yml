info:
  name: respond to workspace invite
  type: http
  seq: 9

http:
  method: POST
  url: "{{baseUrl}}/api/invites/{{workspaceId}}/response"
  body:
    type: json
    data: |-
      {
        "action": "accept"
      }
  auth: inherit

runtime:
  variables:
    - name: workspaceId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Accept or decline a workspace invitation.

  ## Required Variables
  - workspaceId (uuid): ID of the workspace

  ## Request Body
  - action (string): "accept" or "decline"

  ## Response
  Returns 204 No Content on success.