info:
  name: validate invite token
  type: http
  seq: 11

http:
  method: GET
  url: "{{baseUrl}}/api/invites/validate/{{token}}"
  auth: inherit

runtime:
  variables:
    - name: token
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Validates an invite token without authenticating.

  ## Required Variables
  - token (string): The invite token from the invite link

  ## Response
  Returns workspace details if token is valid and not expired.
  Returns 404 if token is invalid or expired.