info:
  name: get invite by id
  type: http
  seq: 10

http:
  method: GET
  url: "{{baseUrl}}/api/invites/{{inviteId}}"
  auth: inherit

runtime:
  variables:
    - name: inviteId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Retrieves a single invite by its ID.

  ## Required Variables
  - inviteId (uuid): ID of the invite

  ## Response
  Returns the invite object with status, email, workspace details.