info:
  name: get workspace invites
  type: http
  seq: 7

http:
  method: GET
  url: "{{baseUrl}}/api/workspaces/{{workspaceId}}/invites"
  auth: inherit

runtime:
  variables:
    - name: workspaceId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Retrieves all pending invites for a workspace.

  ## Required Variables
  - workspaceId (uuid): ID of the workspace

  ## Response
  Returns an array of invite objects with email, role, status.