info:
  name: create workspace
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/workspaces"
  body:
    type: json
    data: |-
      {
        "name": "My Workspace"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Creates a new workspace for the authenticated user.

  ## Request Body
  - name (string, required): Workspace name

  ## Response
  Returns the created workspace object with id, name, createdAt.

  ## Usage
  Run this first to get a workspaceId for other requests.
