info:
  name: get user invites
  type: http
  seq: 8

http:
  method: GET
  url: "{{baseUrl}}/api/invites"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Retrieves all workspace invitations sent to the current user.

  ## Response
  Returns an array of pending invites across all workspaces.