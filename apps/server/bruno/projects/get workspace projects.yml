info:
  name: get workspace projects
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/api/workspaces/{{workspaceId}}/projects"
  auth: inherit

runtime:
  variables:
    - name: workspaceId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Retrieves all projects in a workspace.

  ## Required Variables
  - workspaceId (uuid): ID of the workspace

  ## Response
  Returns an array of project objects with tasks count.