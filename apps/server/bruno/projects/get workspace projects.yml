info:
  name: get workspace projects
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/api/workspaces/{{workspaceId}}/projects"
  auth: inherit

runtime:
  variables:
    - name: workspaceId
      value: 792a55c9-5882-4475-bce0-f4e30060d214

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
