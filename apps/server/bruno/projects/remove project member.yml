info:
  name: remove project member
  type: http
  seq: 8

http:
  method: DELETE
  url: "{{baseUrl}}/api/projects/{{projectId}}/members/{{userId}}"
  auth: inherit

runtime:
  variables:
    - name: projectId
      value: ""
    - name: userId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Removes a member from a project.

  ## Required Variables
  - projectId (uuid): ID of the project
  - userId (uuid): ID of the user to remove

  ## Response
  Returns 204 No Content on success.