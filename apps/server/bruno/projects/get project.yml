info:
  name: get project by id
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/projects/{{projectId}}"
  auth: inherit

runtime:
  variables:
    - name: projectId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Retrieves a single project by its ID.

  ## Required Variables
  - projectId (uuid): ID of the project

  ## Response
  Returns the project object with member and task details.