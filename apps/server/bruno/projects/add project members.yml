info:
  name: add project members
  type: http
  seq: 7

http:
  method: POST
  url: "{{baseUrl}}/api/projects/{{projectId}}/members"
  body:
    type: json
    data: |-
      {
        "userIds": ["{{userId}}"]
      }
  auth: inherit

runtime:
  variables:
    - name: projectId
      value: ""
    - name: userId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Adds members to a project.

  ## Required Variables
  - projectId (uuid): ID of the project
  - userId (uuid): ID of the user to add

  ## Request Body
  - userIds (array): Array of user IDs to add

  ## Response
  Returns the updated member list.