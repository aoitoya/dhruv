info:
  name: create project
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/workspaces/{{workspaceId}}/projects"
  body:
    type: json
    data: |-
      {
        "name": "New Project",
        "description": "Project description",
        "color": "#ff0000",
        "dueDate": "2026-12-31"
      }
  auth: inherit

runtime:
  variables:
    - name: workspaceId
      value: 792a55c9-5882-4475-bce0-f4e30060d214

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
