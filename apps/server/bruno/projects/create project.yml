info:
  name: create project
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/workspaces/{{workspaceId}}/projects"
  body:
    type: json
    data: |-
      {
        "name": "New Project",
        "description": "Project description",
        "color": "#3b82f6"
      }
  auth: inherit

runtime:
  variables:
    - name: workspaceId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Creates a new project in a workspace.

  ## Required Variables
  - workspaceId (uuid): ID of the workspace

  ## Request Body
  - name (string, required): Project name
  - description (string, optional): Project description
  - color (string, optional): Hex color code (e.g., "#ff0000")
  - dueDate (string, optional): ISO date string (e.g., "2026-12-31")

  ## Response
  Returns the created project object.