info:
  name: get project members
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/api/projects/{{projectId}}/members"
  auth: inherit

runtime:
  variables:
    - name: projectId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Retrieves all members of a project.

  ## Required Variables
  - projectId (uuid): ID of the project

  ## Response
  Returns an array of member objects with user details.