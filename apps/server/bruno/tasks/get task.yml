info:
  name: get task by id
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/tasks/{{taskId}}"
  auth: inherit

runtime:
  variables:
    - name: taskId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Retrieves a single task by its ID.

  ## Required Variables
  - taskId (uuid): ID of the task

  ## Response
  Returns the task object with subtasks and comments.