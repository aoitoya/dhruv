info:
  name: delete task
  type: http
  seq: 5

http:
  method: DELETE
  url: "{{baseUrl}}/api/tasks/{{taskId}}"
  auth: inherit

runtime:
  variables:
    - name: taskId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Deletes a task and its subtasks.

  ## Required Variables
  - taskId (uuid): ID of the task

  ## Response
  Returns 204 No Content on success.