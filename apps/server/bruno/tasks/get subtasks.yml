info:
  name: get subtasks
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/api/tasks/{{taskId}}/subtasks"
  auth: inherit

runtime:
  variables:
    - name: taskId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Retrieves all subtasks of a task.

  ## Required Variables
  - taskId (uuid): ID of the parent task

  ## Response
  Returns an array of subtask objects.