info:
  name: create task
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/projects/{{projectId}}/tasks"
  body:
    type: json
    data: |-
      {
        "title": "New Task"
      }
  auth: inherit

runtime:
  variables:
    - name: projectId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Creates a new task in a project.

  ## Required Variables
  - projectId (uuid): ID of the project

  ## Request Body
  - title (string, required): Task title
  - description (string, optional): Task description
  - status (string, optional): TODO, IN_PROGRESS, DONE
  - priority (string, optional): LOW, MEDIUM, HIGH

  ## Response
  Returns the created task object.